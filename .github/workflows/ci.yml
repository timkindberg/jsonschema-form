name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per ref; new pushes cancel the stale run to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded browser binaries; keyed on the lockfile so a
      # Playwright bump re-downloads. System deps (--with-deps) still run below.
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      # Each step runs the exact npm script used locally and lets the real exit
      # code propagate — no tail/head/sed piping, which previously masked a red
      # gate (bd jsonschema-form-car / PR #31). GitHub's default bash shell also
      # runs with `set -eo pipefail`.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Test (all workspaces)
        run: npm run test

  # Separate from the fast `gate` job (which stays build-free — ADR 009): this
  # builds every package with tsup and proves the published artifacts are
  # actually consumable from OUTSIDE the workspace. It packs each package,
  # runs publint + are-the-types-wrong on the tarballs, then installs them into
  # a throwaway consumer and asserts dual ESM+CJS runtime + a clean typecheck
  # (see scripts/smoke-external.mjs, ADR 036).
  build-and-smoke:
    name: build-and-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages (tsup ESM + CJS + d.ts)
        run: npm run build

      - name: External-consumer smoke test (pack + publint + attw + dual runtime)
        run: npm run smoke
