name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per ref; new pushes cancel the stale run to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded browser binaries; keyed on the lockfile so a
      # Playwright bump re-downloads. System deps (--with-deps) still run below.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      # Each step runs the exact npm script used locally and lets the real exit
      # code propagate — no tail/head/sed piping, which previously masked a red
      # gate (bd jsonschema-form-car / PR #31). GitHub's default bash shell also
      # runs with `set -eo pipefail`.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Test (all workspaces)
        run: npm run test
