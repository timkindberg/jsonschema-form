<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="840"
  viewBox="0 0 1600 840"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">FormFrame composition reels</title>
  <desc id="description">
    A slot-machine-inspired composition diagram. Zod, Standard Schema, default
    presentation, native FormData, and React are aligned as one selected stack.
    Other schema inputs, validators, presentation systems, form-state adapters,
    and renderers appear above and below as alternative choices. The FormFrame
    form tree is the fixed axle between inputs and consumers.
  </desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071013" />
      <stop offset="0.55" stop-color="#0d1a1d" />
      <stop offset="1" stop-color="#071013" />
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16282c" />
      <stop offset="0.5" stop-color="#0c171a" />
      <stop offset="1" stop-color="#132428" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b9e7de" stop-opacity="0.04" />
      <stop offset="0.5" stop-color="#effff9" stop-opacity="0.12" />
      <stop offset="1" stop-color="#b9e7de" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="selected" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4cf" />
      <stop offset="1" stop-color="#f5df9e" />
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff845e" />
      <stop offset="1" stop-color="#e84d32" />
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0" stop-color="#ff7551" stop-opacity="0.28" />
      <stop offset="1" stop-color="#ff7551" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path
        d="M 32 0 L 0 0 0 32"
        fill="none"
        stroke="#b7dcd5"
        stroke-opacity="0.035"
        stroke-width="1"
      />
    </pattern>
    <filter id="machineShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-opacity="0.45" />
    </filter>
    <filter id="cardShadow" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="8"
        flood-color="#000000"
        flood-opacity="0.35"
      />
      <feDropShadow
        dx="0"
        dy="0"
        stdDeviation="5"
        flood-color="#ffd978"
        flood-opacity="0.28"
      />
    </filter>
    <filter id="coreShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow
        dx="0"
        dy="10"
        stdDeviation="10"
        flood-color="#000000"
        flood-opacity="0.4"
      />
      <feDropShadow
        dx="0"
        dy="0"
        stdDeviation="12"
        flood-color="#ff6748"
        flood-opacity="0.28"
      />
    </filter>
    <clipPath id="inputClip">
      <rect x="88" y="222" width="220" height="398" rx="20" />
    </clipPath>
    <clipPath id="validationClip">
      <rect x="551" y="222" width="220" height="398" rx="20" />
    </clipPath>
    <clipPath id="presentationClip">
      <rect x="789" y="222" width="220" height="398" rx="20" />
    </clipPath>
    <clipPath id="stateClip">
      <rect x="1027" y="222" width="220" height="398" rx="20" />
    </clipPath>
    <clipPath id="rendererClip">
      <rect x="1265" y="222" width="220" height="398" rx="20" />
    </clipPath>
  </defs>

  <!-- Ground -->
  <rect width="1600" height="840" fill="url(#page)" />
  <rect width="1600" height="840" fill="url(#grid)" />
  <ellipse cx="800" cy="775" rx="690" ry="46" fill="#000" opacity="0.3" />

  <!-- Header -->
  <text
    x="72"
    y="78"
    fill="#f8efd8"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
