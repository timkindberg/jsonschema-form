<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="820"
  viewBox="0 0 1600 820"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">FormFrame composition reels</title>
  <desc id="description">
    A clean, light composition diagram inspired by vertical game-show wheels.
    Zod, Standard Schema, default presentation, native FormData, and React align
    as one selected stack. Skewed panels above and below show alternative schema
    inputs, validators, presentation systems, form-state adapters, and
    renderers. The FormFrame form tree remains fixed between inputs and
    consumers.
  </desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf5" />
      <stop offset="1" stop-color="#eef3ef" />
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f3f6f3" />
    </linearGradient>
    <linearGradient id="upperPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7f5" />
      <stop offset="1" stop-color="#dce7e2" />
    </linearGradient>
    <linearGradient id="lowerPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dce7e2" />
      <stop offset="1" stop-color="#f4f7f5" />
    </linearGradient>
    <linearGradient id="selectedPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#fff2e9" />
    </linearGradient>
    <linearGradient id="corePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7c56" />
      <stop offset="1" stop-color="#ec4f35" />
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#173f42" opacity="0.055" />
    </pattern>
    <filter id="machineShadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow
        dx="0"
        dy="18"
        stdDeviation="22"
        flood-color="#173f42"
        flood-opacity="0.13"
      />
    </filter>
    <filter id="selectedShadow" x="-25%" y="-35%" width="150%" height="170%">
      <feDropShadow
        dx="0"
        dy="7"
        stdDeviation="8"
        flood-color="#c8452f"
        flood-opacity="0.16"
      />
    </filter>
    <filter id="coreShadow" x="-30%" y="-35%" width="160%" height="180%">
      <feDropShadow
        dx="0"
        dy="10"
        stdDeviation="11"
        flood-color="#8d2c1e"
        flood-opacity="0.24"
      />
    </filter>
    <style>
      .heading {
        fill: #122f32;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 46px;
        font-weight: 700;
        letter-spacing: -1px;
      }
      .eyebrow {
        fill: #5e7877;
        font-family: "Arial Narrow", "Avenir Next Condensed", sans-serif;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 2.2px;
      }
      .reel-label {
        fill: #607a79;
        font-family: "Arial Narrow", "Avenir Next Condensed", sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 2.2px;
        text-anchor: middle;
      }
      .option {
        fill: #355c5d;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 18px;
        font-weight: 700;
        text-anchor: middle;
      }
      .far-option {
        fill: #79918e;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
      }
      .selected-name {
        fill: #123f42;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 25px;
        font-weight: 800;
        text-anchor: middle;
      }
      .selected-small {
        fill: #e95137;
        font-family: "Arial Narrow", "Avenir Next Condensed", sans-serif;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 1.6px;
        text-anchor: middle;
      }
      .far-panel {
        fill: #edf2ef;
        stroke: #cad7d2;
        stroke-width: 1.5;
      }
      .upper-panel {
        fill: url(#upperPanel);
        stroke: #b9cbc5;
        stroke-width: 1.5;
      }
      .lower-panel {
        fill: url(#lowerPanel);
        stroke: #b9cbc5;
        stroke-width: 1.5;
      }
      .selected-panel {
        fill: url(#selectedPanel);
        stroke: #f26445;
        stroke-width: 2;
      }
      .panel-seam {
        fill: none;
        stroke: #ffffff;
        stroke-opacity: 0.9;
        stroke-width: 2;
      }
    </style>
  </defs>

  <!-- Page -->
  <rect width="1600" height="820" fill="url(#page)" />
  <rect width="1600" height="820" fill="url(#dots)" />
  <ellipse cx="800" cy="766" rx="690" ry="27" fill="#173f42" opacity="0.08" />

  <!-- Header -->
  <text x="70" y="72" class="heading">One tree. Many stacks.</text>
  <text x="72" y="110" class="eyebrow">
    EACH WHEEL IS A CAPABILITY. THE CENTER ROW IS ONE WORKING COMBINATION.
  </text>

  <!-- Machine body -->
  <rect
    x="44"
    y="142"
    width="1512"
    height="596"
    rx="34"
    fill="url(#machine)"
    stroke="#cdd9d4"
    stroke-width="2"
    filter="url(#machineShadow)"
  />
  <rect
    x="62"
    y="160"
    width="1476"
    height="52"
    rx="18"
    fill="#eef3f0"
    stroke="#d8e1dd"
  />
  <text x="84" y="192" class="eyebrow" font-size="12">COMPOSITION DECK</text>
  <g transform="translate(1357 172)">
    <rect width="155" height="28" rx="14" fill="#ffffff" stroke="#c7d5d0" />
    <circle cx="17" cy="14" r="5" fill="#f26445" />
    <text
      x="86"
      y="18"
      fill="#496766"
      font-family="ui-monospace, 'SFMono-Regular', Consolas, monospace"
      font-size="10"
      font-weight="800"
      letter-spacing="1"
      text-anchor="middle"
    >
      CURRENT STACK
    </text>
  </g>

  <!-- Highlight rail -->
  <rect
    x="64"
    y="347"
    width="1472"
    height="138"
    rx="24"
    fill="#fff7f2"
    fill-opacity="0.88"
    stroke="#f4c7b8"
    stroke-width="1.5"
  />
  <path
    d="M78 416 H1522"
    fill="none"
    stroke="#f26445"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.38"
  />

  <!-- Reel headings -->
  <text x="186" y="238" class="reel-label">INPUT</text>
  <text x="658" y="238" class="reel-label">VALIDATION</text>
  <text x="896" y="238" class="reel-label">PRESENTATION</text>
  <text x="1134" y="238" class="reel-label">FORM STATE</text>
  <text x="1372" y="238" class="reel-label">RENDERER</text>

  <!-- Input wheel -->
  <g transform="translate(76 0)">
    <rect
      x="0"
      y="251"
      width="220"
      height="382"
      rx="20"
      fill="#e8efec"
      stroke="#b8cac4"
      stroke-width="2"
    />
    <rect x="10" y="262" width="200" height="360" rx="15" fill="#f8faf8" />
    <path d="M36 262 H184 L200 295 H20 Z" class="far-panel" />
    <path d="M20 299 H200 L218 368 H2 Z" class="upper-panel" />
    <rect
      x="2"
      y="372"
      width="216"
      height="102"
      rx="11"
      class="selected-panel"
      filter="url(#selectedShadow)"
    />
    <path d="M2 478 H218 L200 547 H20 Z" class="lower-panel" />
    <path d="M20 551 H200 L184 622 H36 Z" class="far-panel" />
    <path d="M24 300 Q110 320 196 300" class="panel-seam" opacity="0.6" />
    <path d="M24 546 Q110 526 196 546" class="panel-seam" opacity="0.6" />
    <text x="110" y="283" class="far-option" opacity="0.46">TypeBox*</text>
    <text
      x="110"
      y="340"
      class="option"
      opacity="0.72"
      transform="rotate(-3 110 340)"
    >
      JSON Schema
    </text>
    <text x="110" y="395" class="selected-small">SELECTED</text>
    <text x="110" y="439" class="selected-name">Zod</text>
    <text
      x="110"
      y="520"
      class="option"
      opacity="0.72"
      transform="rotate(3 110 520)"
    >
      ArkType*
    </text>
    <text x="110" y="592" class="far-option" opacity="0.46">
      Custom source
    </text>
    <polygon points="220,405 234,416 220,427" fill="#f26445" />
  </g>

  <!-- Fixed FormFrame core -->
  <g filter="url(#coreShadow)">
    <rect
      x="326"
      y="287"
      width="198"
      height="278"
      rx="27"
      fill="#ffffff"
      stroke="#f26445"
      stroke-width="3"
    />
    <rect
      x="338"
      y="299"
      width="174"
      height="254"
      rx="19"
      fill="url(#corePanel)"
    />
    <path
      d="M425 330 V367 M425 367 H387 V399 M425 367 H463 V399"
      fill="none"
      stroke="#fff8ec"
      stroke-width="5"
      stroke-linecap="round"
    />
    <g fill="#fff8ec">
      <circle cx="425" cy="322" r="10" />
      <circle cx="387" cy="407" r="10" />
      <circle cx="463" cy="407" r="10" />
    </g>
    <text
      x="425"
      y="456"
      fill="#69271d"
      font-family="'Arial Narrow', 'Avenir Next Condensed', sans-serif"
      font-size="11"
      font-weight="800"
      letter-spacing="2"
      text-anchor="middle"
    >
      FORMFRAME
    </text>
    <text
      x="425"
      y="489"
      fill="#fff8ec"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="25"
      font-weight="700"
      text-anchor="middle"
    >
      Form tree
    </text>
    <text
      x="425"
      y="527"
      fill="#7a2b20"
      font-family="ui-monospace, 'SFMono-Regular', Consolas, monospace"
      font-size="10"
      font-weight="800"
      letter-spacing="1.7"
      text-anchor="middle"
    >
      FIXED CORE
    </text>
  </g>
  <g fill="none" stroke="#f26445" stroke-width="3" stroke-linecap="round">
    <path d="M310 416 H316" />
    <path d="M308 408 L318 416 308 424" />
    <path d="M525 416 H538" />
    <path d="M532 408 L542 416 532 424" />
  </g>

  <!-- Validation wheel -->
  <g transform="translate(548 0)">
    <rect
      x="0"
      y="251"
      width="220"
      height="382"
      rx="20"
      fill="#e8efec"
      stroke="#b8cac4"
      stroke-width="2"
    />
    <rect x="10" y="262" width="200" height="360" rx="15" fill="#f8faf8" />
    <path d="M36 262 H184 L200 295 H20 Z" class="far-panel" />
    <path d="M20 299 H200 L218 368 H2 Z" class="upper-panel" />
    <rect
      x="2"
      y="372"
      width="216"
      height="102"
      rx="11"
      class="selected-panel"
      filter="url(#selectedShadow)"
    />
    <path d="M2 478 H218 L200 547 H20 Z" class="lower-panel" />
    <path d="M20 551 H200 L184 622 H36 Z" class="far-panel" />
    <path d="M24 300 Q110 320 196 300" class="panel-seam" opacity="0.6" />
    <path d="M24 546 Q110 526 196 546" class="panel-seam" opacity="0.6" />
    <text x="110" y="283" class="far-option" opacity="0.46">None</text>
    <text
      x="110"
      y="340"
      class="option"
      opacity="0.72"
      transform="rotate(-3 110 340)"
    >
      AJV
    </text>
    <text x="110" y="395" class="selected-small">SELECTED</text>
    <text x="110" y="424" class="selected-name" font-size="18">Standard</text>
    <text x="110" y="448" class="selected-name" font-size="18">Schema</text>
    <text
      x="110"
      y="520"
      class="option"
      font-size="16"
      opacity="0.72"
      transform="rotate(3 110 520)"
    >
      Zod adapter
    </text>
    <text x="110" y="592" class="far-option" opacity="0.46">Custom</text>
    <polygon points="220,405 234,416 220,427" fill="#f26445" />
  </g>

  <!-- Presentation wheel -->
  <g transform="translate(786 0)">
    <rect
      x="0"
      y="251"
      width="220"
      height="382"
      rx="20"
      fill="#e8efec"
      stroke="#b8cac4"
      stroke-width="2"
    />
    <rect x="10" y="262" width="200" height="360" rx="15" fill="#f8faf8" />
    <path d="M36 262 H184 L200 295 H20 Z" class="far-panel" />
    <path d="M20 299 H200 L218 368 H2 Z" class="upper-panel" />
    <rect
      x="2"
      y="372"
      width="216"
      height="102"
      rx="11"
      class="selected-panel"
      filter="url(#selectedShadow)"
    />
    <path d="M2 478 H218 L200 547 H20 Z" class="lower-panel" />
    <path d="M20 551 H200 L184 622 H36 Z" class="far-panel" />
    <path d="M24 300 Q110 320 196 300" class="panel-seam" opacity="0.6" />
    <path d="M24 546 Q110 526 196 546" class="panel-seam" opacity="0.6" />
    <text x="110" y="283" class="far-option" opacity="0.46">Resolver</text>
    <text
      x="110"
      y="340"
      class="option"
      font-size="16"
      opacity="0.72"
      transform="rotate(-3 110 340)"
    >
      Design system
    </text>
    <text x="110" y="395" class="selected-small">SELECTED</text>
    <text x="110" y="439" class="selected-name" font-size="22">Defaults</text>
    <text
      x="110"
      y="520"
      class="option"
      font-size="16"
      opacity="0.72"
      transform="rotate(3 110 520)"
    >
      Custom parts
    </text>
    <text x="110" y="592" class="far-option" opacity="0.46">Bare facts</text>
    <polygon points="220,405 234,416 220,427" fill="#f26445" />
  </g>

  <!-- Form-state wheel -->
  <g transform="translate(1024 0)">
    <rect
      x="0"
      y="251"
      width="220"
      height="382"
      rx="20"
      fill="#e8efec"
      stroke="#b8cac4"
      stroke-width="2"
    />
    <rect x="10" y="262" width="200" height="360" rx="15" fill="#f8faf8" />
    <path d="M36 262 H184 L200 295 H20 Z" class="far-panel" />
    <path d="M20 299 H200 L218 368 H2 Z" class="upper-panel" />
    <rect
      x="2"
      y="372"
      width="216"
      height="102"
      rx="11"
      class="selected-panel"
      filter="url(#selectedShadow)"
    />
    <path d="M2 478 H218 L200 547 H20 Z" class="lower-panel" />
    <path d="M20 551 H200 L184 622 H36 Z" class="far-panel" />
    <path d="M24 300 Q110 320 196 300" class="panel-seam" opacity="0.6" />
    <path d="M24 546 Q110 526 196 546" class="panel-seam" opacity="0.6" />
    <text x="110" y="283" class="far-option" opacity="0.46">Custom store</text>
    <text
      x="110"
      y="340"
      class="option"
      font-size="15"
      opacity="0.72"
      transform="rotate(-3 110 340)"
    >
      React Hook Form
    </text>
    <text x="110" y="395" class="selected-small">SELECTED</text>
    <text x="110" y="424" class="selected-name" font-size="20">Native</text>
    <text x="110" y="448" class="selected-name" font-size="16">+ FormData</text>
    <text
      x="110"
      y="520"
      class="option"
      font-size="15"
      opacity="0.72"
      transform="rotate(3 110 520)"
    >
      TanStack Form*
    </text>
    <text x="110" y="592" class="far-option" opacity="0.46">Controlled*</text>
    <polygon points="220,405 234,416 220,427" fill="#f26445" />
  </g>

  <!-- Renderer wheel -->
  <g transform="translate(1262 0)">
    <rect
      x="0"
      y="251"
      width="220"
      height="382"
      rx="20"
      fill="#e8efec"
      stroke="#b8cac4"
      stroke-width="2"
    />
    <rect x="10" y="262" width="200" height="360" rx="15" fill="#f8faf8" />
    <path d="M36 262 H184 L200 295 H20 Z" class="far-panel" />
    <path d="M20 299 H200 L218 368 H2 Z" class="upper-panel" />
    <rect
      x="2"
      y="372"
      width="216"
      height="102"
      rx="11"
      class="selected-panel"
      filter="url(#selectedShadow)"
    />
    <path d="M2 478 H218 L200 547 H20 Z" class="lower-panel" />
    <path d="M20 551 H200 L184 622 H36 Z" class="far-panel" />
    <path d="M24 300 Q110 320 196 300" class="panel-seam" opacity="0.6" />
    <path d="M24 546 Q110 526 196 546" class="panel-seam" opacity="0.6" />
    <text x="110" y="283" class="far-option" opacity="0.46">Vanilla</text>
    <text
      x="110"
      y="340"
      class="option"
      opacity="0.72"
      transform="rotate(-3 110 340)"
    >
      Vue*
    </text>
    <text x="110" y="395" class="selected-small">SELECTED</text>
    <text x="110" y="439" class="selected-name">React</text>
    <text
      x="110"
      y="520"
      class="option"
      opacity="0.72"
      transform="rotate(3 110 520)"
    >
      Svelte*
    </text>
    <text x="110" y="592" class="far-option" opacity="0.46">Solid*</text>
    <polygon points="220,405 234,416 220,427" fill="#f26445" />
  </g>

  <!-- Footer legend -->
  <line x1="72" y1="664" x2="1528" y2="664" stroke="#d5dfdb" />
  <circle cx="82" cy="698" r="6" fill="#f26445" />
  <text
    x="98"
    y="703"
    fill="#294e4f"
    font-family="ui-monospace, 'SFMono-Regular', Consolas, monospace"
    font-size="12"
    font-weight="800"
  >
    SELECTED README STACK
  </text>
  <text
    x="300"
    y="703"
    fill="#758c89"
    font-family="ui-monospace, 'SFMono-Regular', Consolas, monospace"
    font-size="12"
  >
    | * PLANNED / BRING-YOUR-OWN EXAMPLE, NOT A MAINTAINED PACKAGE TODAY
  </text>
  <g transform="translate(1332 684)">
    <rect width="174" height="28" rx="14" fill="#edf3f0" stroke="#cbd9d4" />
    <text
      x="87"
      y="18"
      fill="#5c7775"
      font-family="'Arial Narrow', 'Avenir Next Condensed', sans-serif"
      font-size="10"
      font-weight="800"
      letter-spacing="1.4"
      text-anchor="middle"
    >
      COMPOSE, DON'T LOCK
    </text>
  </g>
</svg>
